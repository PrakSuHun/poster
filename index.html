<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGEN Vertical Poster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #1e293b; /* 외부 배경 */
            display: grid;
            place-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
        }

        /* 세로형 포스터 규격 */
        .poster-container {
            width: 1080px;
            height: 1920px;
            background-color: #030108; /* 아주 깊은 블랙 */
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Pretendard', sans-serif;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            transform-origin: top center;
            transform: scale(calc(min(1, (100vh - 80px) / 1920)));
            transition: transform 0.3s ease;
        }

        /* ✨ NEW: 텍스트 수정 가능 표시 (에디터 모드) */
        [contenteditable="true"] {
            outline: none;
            transition: all 0.2s;
            border-radius: 8px;
        }
        [contenteditable="true"]:hover {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            cursor: text;
        }
        [contenteditable="true"]:focus {
            box-shadow: 0 0 0 3px #6366F1;
            background: rgba(0, 0, 0, 0.6);
        }

        /* 플로팅 안내 패널 */
        .editor-hint {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(99, 102, 241, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: 'Pretendard', sans-serif;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        /* =========================================
           프리미엄 CSS 배경 이펙트
           ========================================= */
        
        .ambient-light {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.12) 0%, transparent 60%);
            z-index: 1;
        }

        .cyber-dots {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 2px, transparent 2px);
            background-size: 60px 60px;
            z-index: 2;
            opacity: 0.3;
            mask-image: radial-gradient(ellipse at center, transparent 30%, black 100%);
            -webkit-mask-image: radial-gradient(ellipse at center, transparent 30%, black 100%);
        }

        .singularity-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 1200px;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .singularity-ring {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 0 150px rgba(99, 102, 241, 0.4),
                inset 0 0 100px rgba(139, 92, 246, 0.3);
            animation: pulse-ring 4s ease-in-out infinite alternate;
        }

        .singularity-ring::before {
            content: '';
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg, 
                transparent 0%, 
                rgba(99, 102, 241, 0.8) 15%, 
                #ffffff 20%,
                transparent 40%, 
                transparent 50%, 
                rgba(139, 92, 246, 0.8) 65%, 
                #ffffff 70%,
                transparent 90%
            );
            mask-image: radial-gradient(transparent 68%, black 69%);
            -webkit-mask-image: radial-gradient(transparent 68%, black 69%);
            animation: spin 8s linear infinite;
        }

        .singularity-core {
            position: absolute;
            width: 780px;
            height: 780px;
            border-radius: 50%;
            background: #030108;
            box-shadow: inset 0 0 60px rgba(0,0,0,1);
            z-index: 4;
        }

        .singularity-flare {
            position: absolute;
            width: 160%;
            height: 8px;
            background: radial-gradient(ellipse at center, rgba(168, 85, 247, 0.9) 0%, rgba(99, 102, 241, 0.5) 40%, transparent 70%);
            transform: rotate(-15deg);
            filter: blur(4px);
            z-index: 5;
            animation: pulse-flare 3s ease-in-out infinite alternate;
        }

        .particles {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px 5px rgba(255,255,255,0.8);
            z-index: 6;
        }
        .p1 { top: 20%; left: 30%; animation: float 5s infinite; transform: scale(0.5); opacity: 0.6; }
        .p2 { top: 70%; left: 80%; animation: float 7s infinite reverse; transform: scale(0.8); opacity: 0.4; }
        .p3 { top: 60%; left: 15%; animation: float 6s infinite; transform: scale(0.4); opacity: 0.7; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse-ring { 100% { transform: scale(1.03); opacity: 0.8; } }
        @keyframes pulse-flare { 100% { width: 170%; opacity: 0.6; } }
        @keyframes float { 50% { transform: translateY(-20px) scale(inherit); } }

        /* ========================================= */

        .content-area {
            position: relative;
            z-index: 10;
            padding: 120px 100px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .top-section {
            text-align: left;
        }

        .progen-tag {
            font-family: 'Poppins', sans-serif;
            color: #8B5CF6;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 20px;
            margin: 0 0 30px 0;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .main-title {
            color: #FFFFFF;
            font-size: 110px;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.04em;
            margin: 0 0 40px 0;
            text-shadow: 0 10px 40px rgba(99, 102, 241, 0.8), 0 2px 10px rgba(0,0,0,0.8);
        }

        .hook-text {
            color: #a1a1aa;
            font-size: 38px;
            font-weight: 500;
            line-height: 1.6;
            letter-spacing: -0.01em;
            margin: 0;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
        }

        .hook-text strong {
            color: #ffffff;
            font-weight: 700;
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bottom-section {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        .benefits-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 6px solid #6366F1;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            backdrop-filter: blur(20px);
            border-radius: 0 24px 24px 0;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .benefit-icon {
            color: #6366F1;
            font-size: 32px;
            width: 40px;
            text-align: center;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .benefit-text {
            color: #f4f4f5;
            font-size: 30px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .info-qr-container {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 50px 80px;
        }

        .info-label {
            font-family: 'Poppins', sans-serif;
            color: #6366F1;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 3px;
            margin: 0 0 12px 0;
        }

        .info-value {
            color: #ffffff;
            font-size: 38px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .info-sub {
            font-size: 22px;
            color: #a1a1aa;
            font-weight: 500;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
        }

        .qr-text-box {
            text-align: right;
        }

        .qr-title {
            color: #ffffff;
            font-weight: 800;
            font-size: 28px;
            margin: 0 0 8px 0;
            letter-spacing: -0.02em;
        }

        .qr-desc {
            color: #a1a1aa;
            font-size: 22px;
            margin: 0;
            font-weight: 500;
        }

        .qr-image-box {
            width: 180px;
            height: 180px;
            background: #ffffff;
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            position: relative;
        }

        .qr-image-box img {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* QR 이미지 교체 안내 툴팁 */
        .qr-tooltip {
            position: absolute;
            top: -40px;
            right: 0;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .qr-image-box:hover .qr-tooltip {
            opacity: 1;
        }
    </style>
</head>
<body>

<!-- 💡 에디터 안내 패널 (웹 배포 시에는 삭제하셔도 됩니다) -->
<div class="editor-hint" id="editorHint">
    <i class="fa-solid fa-pen-to-square"></i> 마우스를 올려 글자를 직접 수정해보세요!
</div>

<div class="poster-container" id="posterNode">
    
    <div class="ambient-light"></div>
    <div class="cyber-dots"></div>

    <div class="singularity-container">
        <div class="singularity-flare"></div>
        <div class="singularity-ring"></div>
        <div class="singularity-core"></div>
        <div class="particles p1"></div>
        <div class="particles p2"></div>
        <div class="particles p3"></div>
    </div>

    <!-- 텍스트 콘텐츠 영역 (수정 가능) -->
    <div class="content-area">
        
        <div class="top-section">
            <p class="progen-tag" contenteditable="true" spellcheck="false">PROGEN</p>
            
            <h1 class="main-title" contenteditable="true" spellcheck="false">
                AI 시대<br>대학생으로<br>살아남기
            </h1>
            
            <p class="hook-text" contenteditable="true" spellcheck="false">
                과제 지옥에서 탈출할 시간.<br>AI에게 대체될 것인가, <strong>AI를 지배할 것인가.</strong>
            </p>
        </div>

        <div class="bottom-section">
            
            <div class="benefits-box">
                <div class="benefit-item">
                    <i class="fa-solid fa-bolt benefit-icon"></i>
                    <p class="benefit-text" contenteditable="true" spellcheck="false">대기업 현직자의 실전 AI 프롬프트 족보 전격 공개</p>
                </div>
                <div class="benefit-item">
                    <i class="fa-solid fa-book-open benefit-icon"></i>
                    <p class="benefit-text" contenteditable="true" spellcheck="false">단순 툴 강의가 아닌, 실제 과제에 바로 쓰는 예제</p>
                </div>
                <div class="benefit-item">
                    <i class="fa-solid fa-laptop-code benefit-icon"></i>
                    <p class="benefit-text" contenteditable="true" spellcheck="false">과제·레포트·자소서·기획서 자동화 실전 마스터</p>
                </div>
            </div>

            <div class="info-qr-container">
                <div class="info-grid">
                    <div>
                        <p class="info-label" contenteditable="true">DATE</p>
                        <p class="info-value" contenteditable="true" spellcheck="false">03. 28 (토)</p>
                    </div>
                    <div>
                        <p class="info-label" contenteditable="true">DEADLINE</p>
                        <p class="info-value" contenteditable="true" spellcheck="false">03. 25 (수) 마감</p>
                    </div>
                    <div>
                        <p class="info-label" contenteditable="true">TARGET</p>
                        <p class="info-value" contenteditable="true" spellcheck="false">100명 한정</p>
                    </div>
                    <div>
                        <p class="info-label" contenteditable="true">FEE</p>
                        <p class="info-value" contenteditable="true" spellcheck="false">무료 <span class="info-sub">(보증금 환불)</span></p>
                    </div>
                </div>
                
                <div class="qr-section">
                    <div class="qr-text-box">
                        <p class="qr-title" contenteditable="true" spellcheck="false">지금 바로 신청하기</p>
                        <p class="qr-desc" contenteditable="true" spellcheck="false">스마트폰 카메라로 스캔</p>
                    </div>
                    <!-- 클릭하여 QR 이미지 URL 교체 기능 -->
                    <div class="qr-image-box" onclick="changeQR()">
                        <div class="qr-tooltip">클릭해서 QR 교체</div>
                        <img id="qrImage" src="https://placehold.co/300x300/ffffff/000000?text=QR+Code" alt="QR Code">
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // QR 이미지 교체 스크립트
    function changeQR() {
        const newUrl = prompt("새로운 QR 코드 이미지의 URL 주소를 입력해주세요:", "https://...");
        if (newUrl && newUrl.trim() !== "") {
            document.getElementById('qrImage').src = newUrl;
        }
    }

    // 안내 패널 5초 후 자연스럽게 숨기기
    setTimeout(() => {
        const hint = document.getElementById('editorHint');
        hint.style.opacity = '0';
        hint.style.transition = 'opacity 1s';
        setTimeout(() => hint.remove(), 1000);
    }, 5000);
</script>

</body>
</html>
