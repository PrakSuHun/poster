<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGEN A2 Print Poster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
            transition: all 0.3s ease; /* 여백 제거 시 부드러운 전환 효과 */
        }

        /* 화면에서 보기 좋게 축소해주는 래퍼 */
        .preview-wrapper {
            transform-origin: top center;
            /* 모니터 높이에 맞춰 축소 */
            transform: scale(calc(min(1, (100vh - 80px) / 3508))); 
            transition: transform 0.3s ease;
        }

        /* 💡 진짜 A2 고해상도 규격 (150 DPI 기준) */
        #posterNode {
            width: 2480px;
            height: 3508px;
            background-color: #030108;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Pretendard', sans-serif;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transition: box-shadow 0.3s ease;
        }

        /* =========================================
           인쇄용 고해상도 배경 이펙트 (애니메이션 제거)
           ========================================= */
        .ambient-light {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 15% 25%, rgba(99, 102, 241, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(139, 92, 246, 0.15) 0%, transparent 55%);
            z-index: 1;
        }

        .cyber-dots {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 3px, transparent 3px);
            background-size: 80px 80px;
            z-index: 2;
            opacity: 0.4;
            mask-image: radial-gradient(ellipse at center, transparent 20%, black 100%);
            -webkit-mask-image: radial-gradient(ellipse at center, transparent 20%, black 100%);
        }

        .singularity-container {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1800px;
            height: 1800px;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .singularity-ring {
            position: absolute;
            width: 1200px;
            height: 1200px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 0 250px rgba(99, 102, 241, 0.5),
                inset 0 0 150px rgba(139, 92, 246, 0.4);
        }

        /* 고정된 그라데이션 링 */
        .singularity-ring::before {
            content: '';
            position: absolute;
            inset: -30px;
            border-radius: 50%;
            background: conic-gradient(
                from 45deg, 
                transparent 0%, 
                rgba(99, 102, 241, 0.9) 15%, 
                #ffffff 20%,
                transparent 40%, 
                transparent 50%, 
                rgba(139, 92, 246, 0.9) 65%, 
                #ffffff 70%,
                transparent 90%
            );
            mask-image: radial-gradient(transparent 68%, black 69%);
            -webkit-mask-image: radial-gradient(transparent 68%, black 69%);
        }

        .singularity-core {
            position: absolute;
            width: 1160px;
            height: 1160px;
            border-radius: 50%;
            background: #030108;
            box-shadow: inset 0 0 100px rgba(0,0,0,1);
            z-index: 4;
        }

        .singularity-flare {
            position: absolute;
            width: 180%;
            height: 15px;
            background: radial-gradient(ellipse at center, rgba(168, 85, 247, 1) 0%, rgba(99, 102, 241, 0.6) 40%, transparent 70%);
            transform: rotate(-15deg);
            filter: blur(8px);
            z-index: 5;
        }

        .particles {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 30px 8px rgba(255,255,255,0.9);
            z-index: 6;
        }
        .p1 { top: 25%; left: 35%; width: 20px; height: 20px; opacity: 0.8; }
        .p2 { top: 65%; left: 75%; width: 25px; height: 25px; opacity: 0.6; }
        .p3 { top: 55%; left: 20%; width: 15px; height: 15px; opacity: 0.9; }

        /* ========================================= */

        .content-area {
            position: relative;
            z-index: 10;
            padding: 220px 160px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .top-section { text-align: left; }

        .progen-tag {
            font-family: 'Poppins', sans-serif;
            color: #8B5CF6;
            font-size: 56px;
            font-weight: 800;
            letter-spacing: 30px;
            margin: 0 0 50px 0;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
        }

        /* 💡 행사 목적을 명확히 보여주는 네온 배지 */
        .workshop-badge {
            display: inline-block;
            border: 4px solid #8B5CF6;
            padding: 18px 50px;
            border-radius: 100px;
            color: #ffffff;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 50px;
            background: rgba(139, 92, 246, 0.15);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.4), inset 0 0 20px rgba(139, 92, 246, 0.3);
            backdrop-filter: blur(10px);
        }

        .main-title {
            color: #FFFFFF;
            font-size: 210px;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.04em;
            margin: 0 0 70px 0;
            text-shadow: 0 15px 50px rgba(99, 102, 241, 0.8), 0 4px 15px rgba(0,0,0,0.8);
        }

        .hook-text {
            color: #ffffff; 
            font-size: 68px;
            font-weight: 500;
            line-height: 1.6;
            letter-spacing: -0.01em;
            margin: 0;
            text-shadow: 0 10px 30px rgba(0,0,0,0.9), 0 2px 10px rgba(0,0,0,0.9);
        }

        .hook-text strong {
            color: #A855F7; 
            font-weight: 800;
            text-shadow: 0 5px 20px rgba(0, 0, 0, 0.8);
        }

        .bottom-section {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 100px;
        }

        .benefits-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 12px solid #6366F1;
            padding: 70px 90px;
            display: flex;
            flex-direction: column;
            gap: 45px;
            backdrop-filter: blur(30px);
            border-radius: 0 36px 36px 0;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            border-top: 2px solid rgba(255,255,255,0.15);
            border-right: 2px solid rgba(255,255,255,0.08);
            border-bottom: 2px solid rgba(255,255,255,0.08);
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .benefit-icon {
            color: #6366F1;
            font-size: 60px;
            width: 70px;
            text-align: center;
            text-shadow: 0 0 25px rgba(99, 102, 241, 0.6);
        }

        .benefit-text {
            color: #f4f4f5;
            font-size: 54px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .info-qr-container {
            border-top: 2px solid rgba(255, 255, 255, 0.15);
            padding-top: 90px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 80px 120px;
        }

        .info-label {
            font-family: 'Poppins', sans-serif;
            color: #6366F1;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 5px;
            margin: 0 0 20px 0;
        }

        .info-value {
            color: #ffffff;
            font-size: 68px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .info-sub {
            font-size: 38px;
            color: #a1a1aa;
            font-weight: 500;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 30px;
        }

        .qr-text-box { text-align: right; }

        .qr-title {
            color: #ffffff;
            font-weight: 800;
            font-size: 50px;
            margin: 0 0 15px 0;
            letter-spacing: -0.02em;
        }

        .qr-desc {
            color: #a1a1aa;
            font-size: 38px;
            margin: 0;
            font-weight: 500;
        }

        .qr-image-box {
            width: 350px;
            height: 350px;
            background: #ffffff;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 15px 50px rgba(99, 102, 241, 0.5);
        }

        .qr-image-box img {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* =========================================
           🖨️ 인쇄 및 추출용 컨트롤 패널 & Print 설정
           ========================================= */
        .control-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(10px);
            font-family: 'Pretendard', sans-serif;
        }

        .control-panel p {
            color: white;
            margin: 0 0 5px 0;
            font-weight: 800;
            font-size: 14px;
            text-align: center;
        }

        .btn {
            background: #6366F1;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn:hover { background: #4f46e5; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid #6366F1; color: #a5b4fc; }
        .btn-outline:hover { background: rgba(99, 102, 241, 0.1); }

        /* PDF 인쇄(Ctrl+P) 시 여백 제거 및 A2 규격 강제 적용 */
        @media print {
            @page {
                size: 420mm 594mm; /* 정확한 A2 규격 */
                margin: 0 !important; /* 브라우저 기본 여백 제거 */
            }
            body {
                background-color: #030108;
                padding: 0;
                margin: 0;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .preview-wrapper {
                transform: none !important;
                width: 100%;
                height: 100%;
            }
            #posterNode {
                box-shadow: none !important;
                width: 100%;
                height: 100%;
            }
            .control-panel {
                display: none !important;
            }
        }
    </style>
</head>
<body>

<!-- 💡 인쇄/추출 컨트롤 패널 -->
<div class="control-panel" id="controlPanel">
    <p>🖨️ A2 포스터 추출 메뉴</p>
    <button class="btn" onclick="window.print()">
        <i class="fa-solid fa-file-pdf"></i> PDF로 저장 (인쇄소 제출용)
    </button>
    <button class="btn btn-outline" onclick="removeMarginsForCapture()">
        <i class="fa-solid fa-crop-simple"></i> 화면 캡처용 여백 제거
    </button>
</div>

<div class="preview-wrapper" id="previewWrapper">
    <!-- 이 박스가 실제 A2 사이즈 규격(2480 x 3508)을 가진 원본입니다 -->
    <div id="posterNode">
        <div class="ambient-light"></div>
        <div class="cyber-dots"></div>

        <div class="singularity-container">
            <div class="singularity-flare"></div>
            <div class="singularity-ring"></div>
            <div class="singularity-core"></div>
            <div class="particles p1"></div>
            <div class="particles p2"></div>
            <div class="particles p3"></div>
        </div>

        <div class="content-area">
            <div class="top-section">
                <p class="progen-tag">PROGEN</p>
                <!-- 💡 추가됨: 워크숍 타이틀 배지 -->
                <div class="workshop-badge">대학생 실전 AI툴 워크숍</div>
                <h1 class="main-title">
                    AI 시대<br>대학생으로<br>살아남기
                </h1>
                <p class="hook-text">
                    과제 지옥에서 탈출할 시간.<br>AI에게 대체될 것인가, <strong>AI를 지배할 것인가.</strong>
                </p>
            </div>

            <div class="bottom-section">
                <div class="benefits-box">
                    <div class="benefit-item">
                        <i class="fa-solid fa-bolt benefit-icon"></i>
                        <p class="benefit-text">대기업 현직자의 실전 AI 프롬프트 족보 전격 공개</p>
                    </div>
                    <div class="benefit-item">
                        <i class="fa-solid fa-book-open benefit-icon"></i>
                        <p class="benefit-text">단순 툴 강의가 아닌, 실제 과제에 바로 쓰는 예제</p>
                    </div>
                    <div class="benefit-item">
                        <i class="fa-solid fa-laptop-code benefit-icon"></i>
                        <p class="benefit-text">과제·레포트·자소서·기획서 자동화 실전 마스터</p>
                    </div>
                </div>

                <div class="info-qr-container">
                    <div class="info-grid">
                        <div>
                            <p class="info-label">DATE</p>
                            <p class="info-value">03. 28 (토)</p>
                        </div>
                        <div>
                            <p class="info-label">DEADLINE</p>
                            <p class="info-value">03. 25 (수) 마감</p>
                        </div>
                        <div>
                            <p class="info-label">TARGET</p>
                            <p class="info-value">100명 한정</p>
                        </div>
                        <div>
                            <p class="info-label">FEE</p>
                            <p class="info-value">무료 <span class="info-sub">(보증금 환불)</span></p>
                        </div>
                    </div>
                    
                    <div class="qr-section">
                        <div class="qr-text-box">
                            <p class="qr-title">지금 바로 신청하기</p>
                            <p class="qr-desc">스마트폰 카메라로 스캔</p>
                        </div>
                        <div class="qr-image-box">
                            <!-- 💡 실제 사이트 주소가 연동된 QR 코드 이미지 -->
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https://progen-web.vercel.app/" alt="PROGEN 신청 QR 코드">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 캡처를 위해 여백 제거하는 함수
    function removeMarginsForCapture() {
        // 1. 바디 배경색을 포스터와 똑같이 맞추고 패딩(여백) 제거
        document.body.style.backgroundColor = '#030108';
        document.body.style.padding = '0';
        
        // 2. 화면에 맞게 축소해두었던 스케일링 원상복구
        document.getElementById('previewWrapper').style.transform = 'none';
        
        // 3. 포스터에 들어간 그림자 효과 제거
        document.getElementById('posterNode').style.boxShadow = 'none';
        
        // 4. 컨트롤 패널 숨기기
        document.getElementById('controlPanel').style.display = 'none';
        
        alert("바깥 여백이 모두 제거되고 100% 원본 사이즈로 커졌습니다!\n\n이제 사용하시는 크롬의 [전체 화면 캡처] 기능을 쓰시면 여백 없이 깔끔하게 저장됩니다.\n(원래 화면으로 돌아가려면 '새로고침'을 누르세요)");
    }
</script>

</body>
</html>
