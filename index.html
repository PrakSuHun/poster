<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROGEN | 1기 지원하기</title>

<!-- 폰트 및 라이브러리 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Pretendard', 'sans-serif'] },
      colors: {
        ai: {
          dark: '#05070A', card: '#111827', primary: '#6366F1', secondary: '#8B5CF6', accent: '#10B981',
        }
      }
    }
  }
}
</script>
<style>
  body { 
    background-color: #F8FAFC; 
    background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.1), transparent 40%), radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.1), transparent 40%);
    background-attachment: fixed;
    color: #111827; 
    -webkit-font-smoothing: antialiased; 
    word-break: keep-all; 
    letter-spacing: -0.02em; 
  }
  .glass { 
    background: rgba(255, 255, 255, 0.85); 
    backdrop-filter: blur(16px); 
    border: 1px solid rgba(255, 255, 255, 1); 
    box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.08), 0 8px 10px -6px rgba(99, 102, 241, 0.04);
  }
  .input-field { 
    width: 100%; 
    background: #FFFFFF; 
    border: 1px solid #E5E7EB; 
    border-radius: 0.75rem; 
    padding: 0.875rem 1rem; 
    color: #1F2937; 
    transition: all 0.3s; 
  }
  .input-field:focus { 
    outline: none; 
    border-color: #8B5CF6; 
    background: #FFFFFF; 
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15); 
  }
  .input-field::placeholder { color: #9CA3AF; }
  select.input-field { 
    appearance: none; 
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
    background-repeat: no-repeat; 
    background-position: right 1rem center; 
    background-size: 1em; 
    padding-right: 2.5rem; 
  }
  select.input-field option { background-color: #FFFFFF; color: #1F2937; }
  .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="selection:bg-ai-secondary selection:text-white pb-20">

<nav class="w-full glass border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-3xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="./index.html" class="font-black text-2xl italic flex items-center">
      <span class="text-gray-900 tracking-tight uppercase">PRO</span><span class="text-ai-secondary tracking-tight uppercase">GEN</span>
    </a>
  </div>
</nav>

<main class="max-w-xl mx-auto px-6 pt-12">
  <div class="text-center mb-10">
    <div class="inline-block px-3 py-1 mb-3 rounded-full bg-indigo-50 border border-indigo-100 text-ai-primary text-sm font-bold tracking-wide shadow-sm">
      1st Generation
    </div>
    <h1 class="text-3xl md:text-4xl font-black mb-4 text-gray-900">PROGEN 1기 지원서</h1>
    <!-- 💡 연동 안내 문구 제거 및 자연스러운 환영 문구로 변경 -->
    <p class="text-gray-500 text-sm md:text-base">현장 특강에 참여해 주셔서 감사합니다!<br>크루 합류를 위한 필수 정보와 지원 동기를 작성해 주세요.</p>
  </div>

  <form id="applyForm" class="space-y-6">
    
    <!-- 1. 본인 확인 정보 -->
    <section class="glass p-6 md:p-8 rounded-3xl space-y-5">
      <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2 border-b border-gray-200 pb-3 mb-4">
        <i class="fa-solid fa-user-check text-ai-secondary"></i> 본인 확인
      </h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">이름 <span class="text-red-500">*</span></label>
          <input type="text" id="name" required placeholder="홍길동" class="input-field">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">연락처 <span class="text-red-500">*</span></label>
          <input type="tel" id="phone" required placeholder="010-0000-0000" maxlength="13" class="input-field">
        </div>
      </div>
    </section>

    <!-- 2. 지원 정보 -->
    <section class="glass p-6 md:p-8 rounded-3xl space-y-5">
      <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2 border-b border-gray-200 pb-3 mb-4">
        <i class="fa-solid fa-fire text-ai-primary"></i> 지원 정보
      </h2>
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">가장 기대되는 프로젝트 <span class="text-red-500">*</span></label>
          <select id="project" required class="input-field">
            <option value="" disabled selected>어떤 활동이 가장 기대되시나요?</option>
            <option value="AI 학점 캐리">🔥 시험 벼락치기 끝판왕 AI 툴로 학점 캐리하기</option>
            <option value="AI 비서 자동화">🚀 귀찮은 작업 1초 컷 수업 녹음 자료조사 자동화</option>
            <option value="콘텐츠 수익화">🎬 방구석 크리에이터 데뷔 AI 콘텐츠로 수익 창출</option>
            <option value="굿즈 플리마켓">🛍️ 내 캐릭터가 굿즈로 플리마켓 완판 셀러 도전</option>
            <option value="모두 기대됨">✨ 하나만 고르기 불가능 전부 다 엄청 기대됨</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">지원 동기 및 포부 <span class="text-red-500">*</span></label>
          <textarea id="motivation" required rows="4" placeholder="PROGEN 1기로서 어떤 성장을 이루고 싶은지 자유롭게 적어주세요." class="input-field resize-none"></textarea>
        </div>
      </div>
    </section>

    <!-- 3. 안내 및 동의 -->
    <section class="glass p-5 md:p-6 rounded-3xl border border-indigo-50 relative overflow-hidden">
      <label class="flex items-start gap-3 cursor-pointer group">
        <div class="relative flex items-center justify-center mt-0.5">
          <input type="checkbox" id="agree" required class="peer appearance-none w-5 h-5 border-2 border-gray-300 rounded bg-white checked:bg-ai-primary checked:border-ai-primary transition-all cursor-pointer">
          <i class="fa-solid fa-check absolute text-white text-xs opacity-0 peer-checked:opacity-100 pointer-events-none"></i>
        </div>
        <div class="text-sm text-gray-700 transition-colors">
          <span class="font-bold text-ai-primary">[필수]</span> 개인정보 수집 및 이용 동의<br>
          <span class="text-xs text-gray-500 mt-1 block">PROGEN 크루 선발, 본인 확인 및 안내 발송을 위해 이름과 연락처를 수집합니다. 수집된 정보는 선발 과정 종료 후 1개월 이내에 안전하게 파기됩니다.</span>
        </div>
      </label>
    </section>

    <!-- 제출 버튼 -->
    <button type="submit" id="submitBtn" class="w-full py-5 bg-gradient-to-r from-ai-secondary to-ai-primary text-white font-black text-xl rounded-2xl hover:shadow-[0_10px_30px_rgba(139,92,246,0.3)] transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2 mt-4">
      <span id="btnText">지원서 제출하기</span>
      <div id="btnLoader" class="loader" style="width:20px;height:20px;border-width:2.5px;"></div>
    </button>
  </form>
</main>

<!-- 성공 모달 (팝업창) -->
<div id="successModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-gray-900/60 backdrop-blur-sm px-4 opacity-0 transition-opacity duration-300">
  <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl transform transition-all scale-95 duration-300 border border-gray-100" id="modalContent">
    <div class="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-5 border border-indigo-100">
      <i class="fa-solid fa-check text-3xl text-ai-secondary"></i>
    </div>
    <h3 class="text-2xl font-black text-gray-900 mb-3">신청 완료되었습니다!</h3>
    <p class="text-gray-600 text-sm mb-8 leading-relaxed">
      PROGEN 합류를 환영합니다.<br>지금 바로 공식 오픈채팅방에 입장해주세요!
    </p>
    
    <!-- 🚨 카카오 오픈채팅 링크를 여기에 넣어주세요 -->
    <a href="https://open.kakao.com/o/your_open_chat_link_here" target="_blank" class="w-full py-4 bg-[#FEE500] text-[#191919] font-black text-lg rounded-xl hover:bg-[#FEE500]/90 transition-all flex items-center justify-center gap-2 mb-4 shadow-lg shadow-[#FEE500]/20">
      <i class="fa-solid fa-comment"></i> 오픈채팅방 바로가기
    </a>
    
    <button type="button" onclick="closeModal()" class="text-gray-400 text-sm hover:text-gray-700 transition-colors underline underline-offset-4">
      메인으로 돌아가기
    </button>
  </div>
</div>

<script>
  // 전화번호 자동 하이픈
  document.getElementById('phone').addEventListener('input', function(e) {
    let number = e.target.value.replace(/[^0-9]/g, "");
    let phone = "";
    if (number.length < 4) { phone = number; } 
    else if (number.length < 7) { phone = number.substr(0, 3) + "-" + number.substr(3); } 
    else if (number.length < 11) { phone = number.substr(0, 3) + "-" + number.substr(3, 3) + "-" + number.substr(6); } 
    else { phone = number.substr(0, 3) + "-" + number.substr(3, 4) + "-" + number.substr(7, 4); }
    e.target.value = phone;
  });

  function showModal() {
    const modal = document.getElementById('successModal');
    const content = document.getElementById('modalContent');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => {
      modal.classList.remove('opacity-0');
      modal.classList.add('opacity-100');
      content.classList.remove('scale-95');
      content.classList.add('scale-100');
    }, 10);
  }

  function closeModal() {
    const modal = document.getElementById('successModal');
    const content = document.getElementById('modalContent');
    modal.classList.remove('opacity-100');
    modal.classList.add('opacity-0');
    content.classList.remove('scale-100');
    content.classList.add('scale-95');
    setTimeout(() => {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      window.location.reload(); 
    }, 300);
  }

  document.getElementById('applyForm').addEventListener('submit', async function(e) {
    e.preventDefault(); 
    
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    
    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
    btnText.innerText = '제출 중...';
    btnLoader.style.display = 'block';

    const formData = {
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      project: document.getElementById('project').value,
      motivation: document.getElementById('motivation').value
    };

    try {
      // 💡 주석 완전 해제! 백엔드 API로 데이터 전송
      const response = await fetch('/api/submit-crew', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });
      
      const result = await response.json();
      
      if (!response.ok) {
        throw new Error(result.message || '서버 오류');
      }
      
      // 전송 성공 시 팝업 열기
      showModal();
      
    } catch (error) {
      console.error('Error:', error);
      alert('신청 처리 중 오류가 발생했습니다.\n' + error.message);
      submitBtn.disabled = false;
      submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
      btnText.innerText = '지원서 제출하기';
      btnLoader.style.display = 'none';
    } 
  });
</script>
</body>
</html>
