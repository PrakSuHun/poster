<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROGEN | 특강 설문조사</title>

<!-- 폰트 및 라이브러리 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Pretendard', 'sans-serif'] },
      colors: {
        ai: {
          dark: '#05070A', card: '#111827', primary: '#6366F1', secondary: '#8B5CF6', accent: '#10B981',
        }
      }
    }
  }
}
</script>
<style>
  body { 
    background-color: #F8FAFC; 
    background-image: radial-gradient(circle at top left, rgba(99, 102, 241, 0.08), transparent 50%), radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.08), transparent 50%);
    background-attachment: fixed;
    color: #111827; 
    -webkit-font-smoothing: antialiased; 
    word-break: keep-all; 
    letter-spacing: -0.02em; 
  }
  .glass { 
    background: rgba(255, 255, 255, 0.9); 
    backdrop-filter: blur(16px); 
    border: 1px solid rgba(255, 255, 255, 1); 
    box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.05), 0 8px 10px -6px rgba(99, 102, 241, 0.02);
  }
  .input-field { 
    width: 100%; 
    background: #F9FAFB; 
    border: 1px solid #E5E7EB; 
    border-radius: 0.75rem; 
    padding: 0.875rem 1rem; 
    color: #1F2937; 
    transition: all 0.3s; 
  }
  .input-field:focus { 
    outline: none; 
    border-color: #6366F1; 
    background: #FFFFFF; 
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); 
  }
  .input-field::placeholder { color: #9CA3AF; }
  select.input-field { 
    appearance: none; 
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
    background-repeat: no-repeat; 
    background-position: right 1rem center; 
    background-size: 1em; 
    padding-right: 2.5rem; 
  }
  .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="selection:bg-ai-primary selection:text-white pb-20">

<nav class="w-full glass border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-3xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="./index.html" class="font-black text-2xl italic flex items-center">
      <span class="text-gray-900 tracking-tight uppercase">PRO</span><span class="text-ai-primary tracking-tight uppercase">GEN</span>
    </a>
  </div>
</nav>

<main class="max-w-xl mx-auto px-6 pt-12">
  <div class="text-center mb-10">
    <div class="inline-block px-3 py-1 mb-3 rounded-full bg-indigo-50 border border-indigo-100 text-ai-primary text-sm font-bold tracking-wide shadow-sm">
      AI 시대, 대학생으로 살아남기
    </div>
    <h1 class="text-3xl md:text-4xl font-black mb-4 text-gray-900">특강 만족도 설문조사</h1>
    <p class="text-gray-500 text-sm md:text-base">오늘 특강은 유익하셨나요?<br>더 나은 활동을 위해 여러분의 솔직한 의견을 들려주세요!</p>
  </div>

  <form id="feedbackForm" class="space-y-6">
    
    <section class="glass p-6 md:p-8 rounded-3xl space-y-6">
      
      <!-- 성별 -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">성별 <span class="text-red-500">*</span></label>
        <select id="gender" required class="input-field">
          <option value="" disabled selected>선택해주세요</option>
          <option value="남성">남성</option>
          <option value="여성">여성</option>
          <option value="선택 안 함">선택 안 함</option>
        </select>
      </div>

      <!-- 좋았던 점 -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">오늘 특강에서 가장 좋았던 점은 무엇인가요? <span class="text-red-500">*</span></label>
        <textarea id="goodPoint" required rows="3" placeholder="예: 평소 몰랐던 AI 툴을 직접 써볼 수 있어서 좋았어요." class="input-field resize-none"></textarea>
      </div>

      <!-- 아쉬웠던 점 -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">오늘 특강에서 아쉬웠던 점이나 개선할 점이 있다면? <span class="text-red-500">*</span></label>
        <textarea id="badPoint" required rows="3" placeholder="예: 시간이 조금 더 길었으면 좋겠어요, 와이파이가 느렸어요 등" class="input-field resize-none"></textarea>
      </div>

      <!-- 전반적인 후기 -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">전반적인 후기 및 바라는 점 <span class="text-red-500">*</span></label>
        <textarea id="review" required rows="4" placeholder="자유롭게 후기를 남겨주세요!" class="input-field resize-none"></textarea>
      </div>

    </section>

    <!-- 제출 버튼 -->
    <button type="submit" id="submitBtn" class="w-full py-5 bg-gradient-to-r from-ai-primary to-ai-secondary text-white font-black text-xl rounded-2xl hover:shadow-[0_10px_30px_rgba(99,102,241,0.3)] transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2 mt-4">
      <span id="btnText">설문 제출하기</span>
      <div id="btnLoader" class="loader" style="width:20px;height:20px;border-width:2.5px;"></div>
    </button>
  </form>
</main>

<!-- 성공 모달 (팝업창) - 크루 지원 유도 -->
<div id="successModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-gray-900/70 backdrop-blur-sm px-4 opacity-0 transition-opacity duration-300">
  <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl transform transition-all scale-95 duration-300 border border-gray-100 relative overflow-hidden" id="modalContent">
    
    <!-- 장식용 그라데이션 -->
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-ai-primary to-ai-secondary"></div>

    <div class="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-5 border border-indigo-100">
      <i class="fa-solid fa-face-smile text-3xl text-ai-primary"></i>
    </div>
    
    <h3 class="text-2xl font-black text-gray-900 mb-2">설문 제출 완료!</h3>
    <p class="text-gray-500 text-sm mb-6 leading-relaxed">
      소중한 의견 감사드립니다.<br>여러분의 피드백으로 더 성장하는 PROGEN이 되겠습니다.
    </p>
    
    <div class="bg-indigo-50 rounded-xl p-4 mb-6 border border-indigo-100">
      <p class="text-sm font-bold text-ai-primary mb-1">🎁 다음 스텝은?</p>
      <p class="text-xs text-gray-600">오늘 경험한 AI의 힘, 일회성으로 끝내기 아쉽지 않으신가요? 지금 바로 PROGEN 1기 크루에 합류해서 함께 성장해요!</p>
    </div>
    
    <!-- 🚨 크루 지원서 링크 연결 (이전에 만든 지원서 html 파일명으로 변경하세요) -->
    <a href="./apply.html" class="w-full py-4 bg-gray-900 text-white font-black text-lg rounded-xl hover:bg-black transition-all flex items-center justify-center gap-2 shadow-lg mb-3">
      🚀 PROGEN 1기 크루 신청하기
    </a>
    
    <button type="button" onclick="closeModal()" class="text-gray-400 text-sm hover:text-gray-700 transition-colors underline underline-offset-4">
      창 닫기
    </button>
  </div>
</div>

<script>
  function showModal() {
    const modal = document.getElementById('successModal');
    const content = document.getElementById('modalContent');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => {
      modal.classList.remove('opacity-0');
      modal.classList.add('opacity-100');
      content.classList.remove('scale-95');
      content.classList.add('scale-100');
    }, 10);
  }

  function closeModal() {
    const modal = document.getElementById('successModal');
    const content = document.getElementById('modalContent');
    modal.classList.remove('opacity-100');
    modal.classList.add('opacity-0');
    content.classList.remove('scale-100');
    content.classList.add('scale-95');
    setTimeout(() => {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      window.location.reload(); 
    }, 300);
  }

  document.getElementById('feedbackForm').addEventListener('submit', async function(e) {
    e.preventDefault(); 
    
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    
    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
    btnText.innerText = '제출 중...';
    btnLoader.style.display = 'block';

    const formData = {
      gender: document.getElementById('gender').value,
      goodPoint: document.getElementById('goodPoint').value,
      badPoint: document.getElementById('badPoint').value,
      review: document.getElementById('review').value
    };

    try {
      // 🚀 실제 API 연동: Vercel에 추가할 /api/submit-feedback 경로로 호출합니다.
      const response = await fetch('/api/submit-feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });
      
      const result = await response.json();
      
      if (!response.ok) {
        throw new Error(result.message || '서버 오류');
      }
      
      showModal();
      
    } catch (error) {
      console.error('Error:', error);
      alert('설문 제출 중 오류가 발생했습니다.\n' + error.message);
      submitBtn.disabled = false;
      submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
      btnText.innerText = '설문 제출하기';
      btnLoader.style.display = 'none';
    } 
  });
</script>
</body>
</html>
