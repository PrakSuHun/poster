<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGEN AI Poster | Web Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #030108;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            font-family: 'Pretendard', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* 가로 480px 너비 컴팩트 컨테이너 */
        #posterNode {
            width: 100%;
            max-width: 480px;
            background-color: #030108;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,1), 0 0 20px rgba(99, 102, 241, 0.1);
            aspect-ratio: 1 / 1.414;
        }

        /* 배경 이펙트 */
        .ambient-light {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 15% 25%, rgba(99, 102, 241, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(139, 92, 246, 0.15) 0%, transparent 55%);
            z-index: 1;
        }

        .cyber-dots {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 25px 25px;
            z-index: 2;
            opacity: 0.2;
            mask-image: radial-gradient(ellipse at center, transparent 20%, black 100%);
            -webkit-mask-image: radial-gradient(ellipse at center, transparent 20%, black 100%);
        }

        /* 중앙 싱귤래리티 디자인 */
        .singularity-container {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            aspect-ratio: 1;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 💡 중앙 구체(링)의 크기를 58% -> 45%로 대폭 축소하여 압박감 해소 */
        .singularity-ring {
            position: absolute;
            width: 45%;
            height: 45%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.3), inset 0 0 15px rgba(139, 92, 246, 0.2);
        }

        .singularity-ring::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(
                from 45deg, 
                transparent 0%, 
                rgba(99, 102, 241, 0.8) 15%, 
                #ffffff 20%,
                transparent 40% , 
                transparent 50%, 
                rgba(139, 92, 246, 0.8) 65%, 
                #ffffff 70%,
                transparent 90%
            );
            mask-image: radial-gradient(transparent 68%, black 69%);
            -webkit-mask-image: radial-gradient(transparent 68%, black 69%);
        }

        .singularity-core {
            position: absolute;
            width: 43.5%; 
            height: 43.5%;
            border-radius: 50%;
            background: #030108;
            box-shadow: inset 0 0 15px rgba(0,0,0,1);
            z-index: 4;
        }

        .singularity-flare {
            position: absolute;
            width: 120%; 
            height: 2px;
            background: radial-gradient(ellipse at center, rgba(168, 85, 247, 0.8) 0%, rgba(99, 102, 241, 0.4) 40%, transparent 70%);
            transform: rotate(-15deg);
            filter: blur(2px);
            z-index: 5;
            opacity: 0.6;
        }

        /* 콘텐츠 영역 - 전체적인 여백(Padding)을 넓혀서 우아한 느낌 강조 */
        .content-area {
            position: relative;
            z-index: 10;
            padding: 50px 35px 30px 35px;
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-grow: 1;
            background: linear-gradient(to bottom, rgba(3,1,8,0.8) 0%, transparent 35%, transparent 65%, rgba(3,1,8,0.8) 100%);
        }

        .progen-tag {
            font-family: 'Poppins', 'Pretendard', sans-serif;
            color: rgba(139, 92, 246, 0.8);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 5px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
        }

        .workshop-highlight-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        /* 💡 뱃지 디자인 트렌디하고 세련되게 전면 개편 */
        .workshop-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            padding: 5px 14px;
            border-radius: 100px;
            color: #e9d5ff; /* 연한 보라색 텍스트 */
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.05em;
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.5), 
                inset 0 0 10px rgba(168, 85, 247, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* 💡 뱃지 옆에 반짝이는 네온 포인트 추가 */
        .badge-dot {
            width: 6px;
            height: 6px;
            background-color: #d8b4fe;
            border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(168, 85, 247, 0.8);
        }

        /* 메인 타이틀 - 과했던 폰트 크기를 줄여 여백 확보 (42px -> 30px) */
        .main-title {
            font-size: 30px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: 0.02em; 
            margin: 0 0 16px 0;
            color: #ffffff;
            text-shadow: 
                0 0 10px rgba(168, 85, 247, 0.5),
                0 4px 12px rgba(0, 0, 0, 0.9),
                0 0 30px rgba(0,0,0,0.8);
        }

        /* 훅 텍스트 - 딱딱한 검은 테두리를 없애고 은은하고 깊은 그림자로 고급스럽게 가독성 확보 */
        .hook-text {
            color: #ffffff; 
            font-size: 13.5px;
            font-weight: 500;
            line-height: 1.6;
            margin: 0;
            text-shadow: 
                0 2px 8px rgba(0,0,0,0.9),
                0 4px 20px rgba(0,0,0,0.7);
        }

        /* 강조 문구 - 보라색 네온 발광 유지하며 세련되게 다듬기 */
        .hook-text strong {
            color: #C084FC; 
            font-weight: 800;
            text-shadow: 
                 0 0 15px rgba(168, 85, 247, 0.8),
                 0 2px 10px rgba(0,0,0,0.8);
        }

        .bottom-section {
            margin-top: auto; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .benefits-box {
            background: rgba(255, 255, 255, 0.04);
            border-left: 3px solid #6366F1;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-radius: 0 10px 10px 0;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 8px;
        }

        .benefit-item { display: flex; align-items: center; gap: 10px; }
        .benefit-icon { color: #6366F1; font-size: 12px; width: 16px; text-align: center; }
        
        /* 💡 혜택 텍스트 - 전체적인 크기 축소 (14px -> 12px) */
        .benefit-text { 
            color: #e4e4e7; 
            font-size: 12px; 
            font-weight: 600; 
            margin: 0; 
            letter-spacing: 0.025em;
        }

        .info-qr-container {
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 4px;
        }

        .info-grid { 
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
            padding-top: 6px; 
        }

        .info-row {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 0px;
        }

        .info-label { 
            color: #6366F1; 
            font-size: 8px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            margin-bottom: 2px; 
        }

        /* 💡 하단 정보 값 텍스트 축소 (18px -> 14px) */
        .info-value { 
            color: #ffffff; 
            font-size: 14px; 
            font-weight: 800; 
            margin: 0; 
            line-height: 1.2; 
            white-space: nowrap;
        }

        .qr-section { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; margin-left: 15px; }
        .qr-text-group { text-align: right; }
        .qr-title { color: #ffffff; font-weight: 800; font-size: 11px; margin-bottom: 2px; white-space: nowrap; line-height: 1.2; }
        .qr-subtitle { color: rgba(255, 255, 255, 0.6); font-weight: 500; font-size: 8px; margin: 0; white-space: nowrap; }
        
        /* 💡 QR 영역 전체 축소 */
        .qr-image-box { 
            width: 65px; 
            height: 65px; 
            background: #ffffff; 
            padding: 4px; 
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }
        .qr-image-box img { width: 100%; height: 100%; display: block; }

        .particles {
            position: absolute;
            background: white;
            border-radius: 50%;
            z-index: 6;
        }
        .p1 { top: 25%; left: 35%; width: 2.5px; height: 2.5px; }
        .p2 { top: 65%; left: 75%; width: 3.5px; height: 3.5px; }
        .p3 { top: 55%; left: 20%; width: 2px; height: 2px; }
        .p4 { top: 15%; left: 60%; width: 3px; height: 3px; }

        @media (max-height: 700px) {
            .main-title { font-size: 28px; margin-bottom: 12px; }
            .content-area { padding: 30px 25px; }
            .info-value { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div id="posterNode">
        <div class="ambient-light"></div>
        <div class="cyber-dots"></div>

        <div class="singularity-container">
            <div class="singularity-flare"></div>
            <div class="singularity-ring"></div>
            <div class="singularity-core"></div>
            <div class="particles p1"></div>
            <div class="particles p2"></div>
            <div class="particles p3"></div>
            <div class="particles p4"></div>
        </div>

        <div class="content-area">
            <div class="top-section">
                <div class="workshop-highlight-container">
                    <div class="workshop-badge">
                        <div class="badge-dot"></div>
                        대학생 실전 AI툴 워크숍
                    </div>
                </div>
                <h1 class="main-title">AI 시대<br>대학생으로<br>살아남기</h1>
                <p class="hook-text">
                    과제 지옥에서 탈출할 시간.<br>
                    AI에게 대체될 것인가, <strong>AI를 지배할 것인가.</strong>
                </p>
            </div>

            <div class="bottom-section">
                <div class="benefits-box">
                    <div class="benefit-item">
                        <i class="fa-solid fa-bolt benefit-icon"></i>
                        <p class="benefit-text">대기업 현직자의 실전 AI 프롬프트 족보 전격 공개</p>
                    </div>
                    <div class="benefit-item">
                        <i class="fa-solid fa-book-open benefit-icon"></i>
                        <p class="benefit-text">단순 툴 강의가 아닌, 실제 과제에 바로 쓰는 예제</p>
                    </div>
                    <div class="benefit-item">
                        <i class="fa-solid fa-laptop-code benefit-icon"></i>
                        <p class="benefit-text">과제·레포트·자소서·기획서 자동화 실전 마스터</p>
                    </div>
                </div>

                <div class="info-qr-container">
                    <div class="info-grid">
                        <div class="info-row">
                            <div>
                                <p class="info-label">DATE</p>
                                <p class="info-value">03. 28 (토)</p>
                            </div>
                            <div>
                                <p class="info-label">PLACE</p>
                                <p class="info-value">충남대학교</p>
                            </div>
                        </div>
                        
                        <div class="info-row">
                            <div>
                                <p class="info-label">DEADLINE</p>
                                <p class="info-value">03. 26 (목) 신청 마감</p>
                            </div>
                            <div>
                                <p class="info-label">TARGET</p>
                                <p class="info-value">선착순 100명</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="qr-section">
                        <div class="qr-text-group">
                            <p class="qr-title">지금 바로 신청하기</p>
                            <p class="qr-subtitle">스마트폰 카메라로 스캔</p>
                        </div>
                        <div class="qr-image-box">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://progen-web.vercel.app/" alt="QR Code">
                        </div>
                    </div>
                </div>

                <p class="progen-tag">주최 PROGEN</p>
            </div>
        </div>
    </div>

</body>
</html>
