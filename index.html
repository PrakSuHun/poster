<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROGEN | 크루 1기 지원하기</title>

<!-- 폰트 및 라이브러리 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Pretendard', 'sans-serif'] },
      colors: {
        ai: {
          dark: '#05070A', card: '#111827', primary: '#6366F1', secondary: '#8B5CF6', accent: '#10B981',
        }
      }
    }
  }
}
</script>
<style>
  /* 💡 배경색을 보라/남색 톤의 다크 그라데이션으로 변경했습니다 */
  body { 
    background-color: #0B0F19; 
    background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.15), transparent 40%), radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.15), transparent 40%);
    background-attachment: fixed;
    color: #F8FAFC; 
    -webkit-font-smoothing: antialiased; 
    word-break: keep-all; 
    letter-spacing: -0.02em; 
  }
  .glass { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
  .input-field { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 0.875rem 1rem; color: white; transition: all 0.3s; }
  .input-field:focus { outline: none; border-color: #8B5CF6; background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2); }
  .input-field::placeholder { color: #6B7280; }
  select.input-field { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; padding-right: 2.5rem; }
  select.input-field option { background-color: #111827; color: white; }
  .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="selection:bg-ai-secondary selection:text-white pb-20">

<nav class="w-full glass border-b border-white/5 sticky top-0 z-50">
  <div class="max-w-3xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="./index.html" class="font-black text-2xl italic flex items-center">
      <span class="text-white tracking-tight uppercase">PRO</span><span class="text-ai-secondary tracking-tight uppercase">GEN</span>
    </a>
  </div>
</nav>

<main class="max-w-xl mx-auto px-6 pt-12">
  <div class="text-center mb-10">
    <div class="inline-block px-3 py-1 mb-3 rounded-full bg-ai-secondary/20 border border-ai-secondary/30 text-ai-secondary text-sm font-bold tracking-wide">
      1st Generation
    </div>
    <h1 class="text-3xl md:text-4xl font-black mb-4">크루 1기 현장 지원서</h1>
    <p class="text-gray-400 text-sm md:text-base">기존 행사 신청 시 작성해주신 정보가 연동됩니다.<br>본인 확인 정보와 지원 동기만 간단히 작성해 주세요!</p>
  </div>

  <form id="applyForm" class="space-y-6">
    
    <!-- 1. 본인 확인 정보 -->
    <section class="glass p-6 md:p-8 rounded-3xl space-y-5 shadow-lg shadow-black/20">
      <h2 class="text-xl font-bold text-white flex items-center gap-2 border-b border-white/10 pb-3 mb-4">
        <i class="fa-solid fa-user-check text-ai-secondary"></i> 본인 확인
      </h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">이름 <span class="text-red-500">*</span></label>
          <input type="text" id="name" required placeholder="홍길동" class="input-field">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">연락처 <span class="text-red-500">*</span></label>
          <input type="tel" id="phone" required placeholder="010-0000-0000" maxlength="13" class="input-field">
          <p class="text-xs text-ai-secondary mt-2"><i class="fa-solid fa-circle-info"></i> 행사 신청 시 입력한 연락처와 동일하게 입력해 주세요.</p>
        </div>
      </div>
    </section>

    <!-- 2. 지원 정보 -->
    <section class="glass p-6 md:p-8 rounded-3xl space-y-5 shadow-lg shadow-black/20">
      <h2 class="text-xl font-bold text-white flex items-center gap-2 border-b border-white/10 pb-3 mb-4">
        <i class="fa-solid fa-fire text-ai-primary"></i> 지원 정보
      </h2>
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">지원 파트 <span class="text-red-500">*</span></label>
          <select id="track" required class="input-field">
            <option value="" disabled selected>어떤 분야로 함께하고 싶으신가요?</option>
            <option value="기획/운영">🎯 기획 / 운영 (PM)</option>
            <option value="디자인">🎨 디자인 (UI/UX, 콘텐츠)</option>
            <option value="개발">💻 개발 (프론트/백엔드/AI)</option>
            <option value="마케팅">📢 마케팅 (홍보, SNS)</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">지원 동기 및 포부 <span class="text-red-500">*</span></label>
          <textarea id="motivation" required rows="4" placeholder="PROGEN 크루에서 어떤 성장을 이루고 싶은지 자유롭게 적어주세요." class="input-field resize-none"></textarea>
        </div>
      </div>
    </section>

    <!-- 제출 버튼 -->
    <button type="submit" id="submitBtn" class="w-full py-5 bg-gradient-to-r from-ai-secondary to-ai-primary text-white font-black text-xl rounded-2xl hover:shadow-[0_10px_30px_rgba(139,92,246,0.4)] transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2 mt-4">
      <span id="btnText">지원서 제출하기</span>
      <div id="btnLoader" class="loader" style="width:20px;height:20px;border-width:2.5px;"></div>
    </button>
  </form>
</main>

<!-- 성공 모달 (팝업창) -->
<div id="successModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 backdrop-blur-sm px-4 opacity-0 transition-opacity duration-300">
  <div class="glass p-8 rounded-3xl max-w-sm w-full text-center border-ai-secondary/50 shadow-[0_0_40px_rgba(139,92,246,0.2)] transform transition-all scale-95 duration-300" id="modalContent">
    <div class="w-16 h-16 bg-ai-secondary/20 rounded-full flex items-center justify-center mx-auto mb-5 border border-ai-secondary/50">
      <i class="fa-solid fa-check text-3xl text-ai-secondary"></i>
    </div>
    <h3 class="text-2xl font-black text-white mb-3">신청 완료되었습니다!</h3>
    <p class="text-gray-300 text-sm mb-8 leading-relaxed">
      PROGEN 크루 합류를 환영합니다.<br>지금 바로 공식 오픈채팅방에 입장해주세요!
    </p>
    
    <!-- 🚨 카카오 오픈채팅 링크를 여기에 넣어주세요 -->
    <a href="https://open.kakao.com/o/your_open_chat_link_here" target="_blank" class="w-full py-4 bg-[#FEE500] text-[#191919] font-black text-lg rounded-xl hover:bg-[#FEE500]/90 transition-all flex items-center justify-center gap-2 mb-4 shadow-lg shadow-[#FEE500]/20">
      <i class="fa-solid fa-comment"></i> 오픈채팅방 바로가기
    </a>
    
    <button type="button" onclick="closeModal()" class="text-gray-500 text-sm hover:text-white transition-colors underline underline-offset-4">
      메인으로 돌아가기
    </button>
  </div>
</div>

<script>
  // 전화번호 자동 하이픈
  document.getElementById('phone').addEventListener('input', function(e) {
    let number = e.target.value.replace(/[^0-9]/g, "");
    let phone = "";
    if (number.length < 4) { phone = number; } 
    else if (number.length < 7) { phone = number.substr(0, 3) + "-" + number.substr(3); } 
    else if (number.length < 11) { phone = number.substr(0, 3) + "-" + number.substr(3, 3) + "-" + number.substr(6); } 
    else { phone = number.substr(0, 3) + "-" + number.substr(3, 4) + "-" + number.substr(7, 4); }
    e.target.value = phone;
  });

  function showModal() {
    const modal = document.getElementById('successModal');
    const content = document.getElementById('modalContent');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => {
      modal.classList.remove('opacity-0');
      modal.classList.add('opacity-100');
      content.classList.remove('scale-95');
      content.classList.add('scale-100');
    }, 10);
  }

  function closeModal() {
    const modal = document.getElementById('successModal');
    const content = document.getElementById('modalContent');
    modal.classList.remove('opacity-100');
    modal.classList.add('opacity-0');
    content.classList.remove('scale-100');
    content.classList.add('scale-95');
    setTimeout(() => {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      window.location.reload(); 
    }, 300);
  }

  document.getElementById('applyForm').addEventListener('submit', async function(e) {
    e.preventDefault(); 
    
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    
    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
    btnText.innerText = '제출 중...';
    btnLoader.style.display = 'block';

    const formData = {
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      track: document.getElementById('track').value,
      motivation: document.getElementById('motivation').value
    };

    try {
      // 🚀 실제 API 연동 시 아래 주석 해제 (테스트용 setTimeout은 삭제)
      /*
      const response = await fetch('/api/submit-crew', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });
      const result = await response.json();
      if (!response.ok) throw new Error(result.message);
      */
      
      await new Promise(resolve => setTimeout(resolve, 1500));
      showModal();
      
    } catch (error) {
      console.error('Error:', error);
      alert('제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.\n(기존 신청 내역이 없는 경우일 수 있습니다.)');
      submitBtn.disabled = false;
      submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
      btnText.innerText = '지원서 제출하기';
      btnLoader.style.display = 'none';
    } 
  });
</script>
</body>
</html>
