<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGEN Vertical Poster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #1e293b; /* 외부 배경 */
            display: grid;
            place-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
        }

        /* 세로형 포스터 규격 */
        .poster-container {
            width: 1080px;
            height: 1920px;
            background-color: #030108; /* 아주 깊은 블랙 */
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Pretendard', sans-serif;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            transform-origin: top center;
            transform: scale(calc(min(1, (100vh - 80px) / 1920)));
        }

        /* =========================================
           ✨ NEW: 프리미엄 CSS 배경 이펙트 (외부 이미지 X) 
           ========================================= */
        
        /* 1. 은은한 앰비언트 라이트 */
        .ambient-light {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.12) 0%, transparent 60%);
            z-index: 1;
        }

        /* 2. 미세한 사이버 닷(Dot) 패턴 */
        .cyber-dots {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 2px, transparent 2px);
            background-size: 60px 60px;
            z-index: 2;
            opacity: 0.3;
            mask-image: radial-gradient(ellipse at center, transparent 30%, black 100%);
            -webkit-mask-image: radial-gradient(ellipse at center, transparent 30%, black 100%);
        }

        /* 3. 메인 오브젝트: AI 특이점 (이클립스 효과) */
        .singularity-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 1200px;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 빛나는 바깥쪽 링 */
        .singularity-ring {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 0 150px rgba(99, 102, 241, 0.4),
                inset 0 0 100px rgba(139, 92, 246, 0.3);
            animation: pulse-ring 4s ease-in-out infinite alternate;
        }

        /* 회전하는 빛의 띠 (코닉 그라데이션) */
        .singularity-ring::before {
            content: '';
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg, 
                transparent 0%, 
                rgba(99, 102, 241, 0.8) 15%, 
                #ffffff 20%,
                transparent 40%, 
                transparent 50%, 
                rgba(139, 92, 246, 0.8) 65%, 
                #ffffff 70%,
                transparent 90%
            );
            /* 가운데를 뚫어서 도넛 모양으로 만듦 */
            mask-image: radial-gradient(transparent 68%, black 69%);
            -webkit-mask-image: radial-gradient(transparent 68%, black 69%);
            animation: spin 8s linear infinite;
        }

        /* 칠흑 같은 중심 코어 */
        .singularity-core {
            position: absolute;
            width: 780px;
            height: 780px;
            border-radius: 50%;
            background: #030108;
            box-shadow: inset 0 0 60px rgba(0,0,0,1);
            z-index: 4;
        }

        /* 수평으로 가로지르는 렌즈 플레어(빛 갈라짐) */
        .singularity-flare {
            position: absolute;
            width: 160%;
            height: 8px;
            background: radial-gradient(ellipse at center, rgba(168, 85, 247, 0.9) 0%, rgba(99, 102, 241, 0.5) 40%, transparent 70%);
            transform: rotate(-15deg);
            filter: blur(4px);
            z-index: 5;
            animation: pulse-flare 3s ease-in-out infinite alternate;
        }

        /* 별빛 / 입자들 */
        .particles {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px 5px rgba(255,255,255,0.8);
            z-index: 6;
        }
        .p1 { top: 20%; left: 30%; animation: float 5s infinite; transform: scale(0.5); opacity: 0.6; }
        .p2 { top: 70%; left: 80%; animation: float 7s infinite reverse; transform: scale(0.8); opacity: 0.4; }
        .p3 { top: 60%; left: 15%; animation: float 6s infinite; transform: scale(0.4); opacity: 0.7; }

        /* 애니메이션 키프레임 */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse-ring { 100% { transform: scale(1.03); opacity: 0.8; } }
        @keyframes pulse-flare { 100% { width: 170%; opacity: 0.6; } }
        @keyframes float { 50% { transform: translateY(-20px) scale(inherit); } }

        /* ========================================= */

        /* 텍스트 콘텐츠 영역 */
        .content-area {
            position: relative;
            z-index: 10;
            padding: 120px 100px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* 상단 타이틀 섹션 */
        .top-section {
            text-align: left;
        }

        .progen-tag {
            font-family: 'Poppins', sans-serif;
            color: #8B5CF6;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 20px;
            margin: 0 0 30px 0;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .main-title {
            color: #FFFFFF;
            font-size: 110px;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.04em;
            margin: 0 0 40px 0;
            text-shadow: 0 10px 40px rgba(99, 102, 241, 0.8), 0 2px 10px rgba(0,0,0,0.8);
        }

        .hook-text {
            color: #a1a1aa;
            font-size: 38px;
            font-weight: 500;
            line-height: 1.6;
            letter-spacing: -0.01em;
            margin: 0;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
        }

        .hook-text strong {
            color: #ffffff;
            font-weight: 700;
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 하단 콘텐츠 영역 */
        .bottom-section {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        /* 혜택 박스 */
        .benefits-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 6px solid #6366F1;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            backdrop-filter: blur(20px);
            border-radius: 0 24px 24px 0;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .benefit-icon {
            color: #6366F1;
            font-size: 32px;
            width: 40px;
            text-align: center;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .benefit-text {
            color: #f4f4f5;
            font-size: 30px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
        }

        /* 행사 정보 및 QR 그리드 */
        .info-qr-container {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 50px 80px;
        }

        .info-label {
            font-family: 'Poppins', sans-serif;
            color: #6366F1;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 3px;
            margin: 0 0 12px 0;
        }

        .info-value {
            color: #ffffff;
            font-size: 38px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .info-sub {
            font-size: 22px;
            color: #a1a1aa;
            font-weight: 500;
        }

        /* QR 섹션 */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
        }

        .qr-text-box {
            text-align: right;
        }

        .qr-title {
            color: #ffffff;
            font-weight: 800;
            font-size: 28px;
            margin: 0 0 8px 0;
            letter-spacing: -0.02em;
        }

        .qr-desc {
            color: #a1a1aa;
            font-size: 22px;
            margin: 0;
            font-weight: 500;
        }

        .qr-image-box {
            width: 180px;
            height: 180px;
            background: #ffffff;
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
        }

        .qr-image-box img {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="poster-container">
    
    <!-- ✨ CSS 기반 고품질 배경 이펙트 (이미지 X) -->
    <div class="ambient-light"></div>
    <div class="cyber-dots"></div>

    <div class="singularity-container">
        <div class="singularity-flare"></div>
        <div class="singularity-ring"></div>
        <div class="singularity-core"></div>
        <div class="particles p1"></div>
        <div class="particles p2"></div>
        <div class="particles p3"></div>
    </div>

    <!-- 텍스트 콘텐츠 영역 -->
    <div class="content-area">
        
        <!-- 상단 헤드라인 -->
        <div class="top-section">
            <p class="progen-tag">PROGEN</p>
            
            <h1 class="main-title">
                AI 시대<br>대학생으로<br>살아남기
            </h1>
            
            <p class="hook-text">
                과제 지옥에서 탈출할 시간.<br>AI에게 대체될 것인가, <strong>AI를 지배할 것인가.</strong>
            </p>
        </div>

        <!-- 하단 정보 영역 -->
        <div class="bottom-section">
            
            <!-- 혜택 요약 박스 -->
            <div class="benefits-box">
                <div class="benefit-item">
                    <i class="fa-solid fa-bolt benefit-icon"></i>
                    <p class="benefit-text">대기업 현직자의 실전 AI 프롬프트 족보 전격 공개</p>
                </div>
                <div class="benefit-item">
                    <i class="fa-solid fa-book-open benefit-icon"></i>
                    <p class="benefit-text">단순 툴 강의가 아닌, 실제 과제에 바로 쓰는 예제</p>
                </div>
                <div class="benefit-item">
                    <i class="fa-solid fa-laptop-code benefit-icon"></i>
                    <p class="benefit-text">과제·레포트·자소서·기획서 자동화 실전 마스터</p>
                </div>
            </div>

            <!-- 행사 정보 및 QR 그리드 -->
            <div class="info-qr-container">
                <div class="info-grid">
                    <div>
                        <p class="info-label">DATE</p>
                        <p class="info-value">03. 28 (토)</p>
                    </div>
                    <div>
                        <p class="info-label">DEADLINE</p>
                        <p class="info-value">03. 25 (수) 마감</p>
                    </div>
                    <div>
                        <p class="info-label">TARGET</p>
                        <p class="info-value">100명 한정</p>
                    </div>
                    <div>
                        <p class="info-label">FEE</p>
                        <p class="info-value">무료 <span class="info-sub">(보증금 환불)</span></p>
                    </div>
                </div>
                
                <!-- QR 코드 스캔 유도 -->
                <div class="qr-section">
                    <div class="qr-text-box">
                        <p class="qr-title">지금 바로 신청하기</p>
                        <p class="qr-desc">스마트폰 카메라로 스캔</p>
                    </div>
                    <div class="qr-image-box">
                        <img src="https://placehold.co/300x300/ffffff/000000?text=QR+Code" alt="QR Code">
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
